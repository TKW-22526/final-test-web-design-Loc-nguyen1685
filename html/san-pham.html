<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm - Pokémon Card Shop</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <h1>Pokémon Card Shop</h1>
    <nav>
        <a href="gioi-thieu.html">Giới thiệu</a>
        <a href="san-pham.html">Sản phẩm</a>
        <a href="lien-he.html">Liên hệ</a>
    </nav>
</header>

<section class="box">
    <h2>Thêm sản phẩm mới</h2>

    <div class="form-add">
        <input type="text" id="productName" placeholder="Tên sản phẩm">
        <input type="number" id="productPrice" placeholder="Giá sản phẩm">
        <input type="text" id="productImage" placeholder="VD: pikachuex.jpg">

        <select id="productType">
            <option value="card">Card Pokémon</option>
            <option value="accessory">Phụ kiện</option>
        </select>

        <button onclick="addProduct()">Thêm sản phẩm</button>
    </div>
</section>

<section class="box">
    <h2>Tìm kiếm sản phẩm</h2>
    <input type="text" id="searchInput" placeholder="Nhập tên sản phẩm..." onkeyup="renderProducts()">
</section>

<section class="box">
    <h2>Card Pokémon</h2>
    <div class="products" id="cardList"></div>
</section>

<section class="box">
    <h2>Phụ kiện</h2>
    <div class="products" id="accessoryList"></div>
</section>

<section class="cart-box">
    <h2>Giỏ hàng</h2>
    <ul id="cartList"></ul>
    <h3 id="totalPrice">Tổng tiền: 0đ</h3>
    <button class="delete-all" onclick="clearCart()">Xóa toàn bộ giỏ hàng</button>
</section>

<footer>
    <p>© 2026 Pokémon Card Shop | Thiết kế bởi Nguyễn Tấn Lộc</p>
</footer>

<script src="../js/script.js"></script>
</body>
</html>
